gopro_manager:
  ros__parameters:
    camera_labels: ["RIGHT", "LEFT"]   # labels map to USB sockets in hub/port order (1st label -> 1st socket); order set to match this rig's physical left/right
    tick_period: 1.0                   # [s] status publish + watchdog health-check period
    strikes_before_restart: 2          # consecutive "not recording" checks before a soft restart
    record_grace_period: 10.0          # [s] after start: encoder init time, watchdog stays quiet
    restart_cooldown: 0.0              # [s] min delay between soft restarts (0 = retry every tick)
    # NOTE: recovery is software-only (re-arm + start), and never gives up while
    # recording. Vbus power-cycling is intentionally NOT done here -- cutting
    # power can corrupt the SD card's FTL.
